<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agustín Chapuis</title>

  <!-- Tipografías -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* Reset básico */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #111;
      color: white;
    }

    /* HEADER FIJO */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background-color: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(8px);
    }

    nav {
      display: flex;
      gap: 40px;
    }

    nav a {
      text-decoration: none;
      color: white;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      transition: opacity 0.3s ease;
    }

    nav a:hover {
      opacity: 0.6;
    }

    /* CONTENIDO DE PRUEBA */
    .content {
      margin-top: 100px;
      padding: 40px;
      height: 2000px; /* solo para probar scroll */
    }
  </style>
</head>

<body>

  <header>
    <nav>
      <a href="#">Inicio</a>
      <a href="#">Portfolio</a>
      <a href="#">Sobre mí</a>
      <a href="#">CV</a>
      <a href="#">Contacto</a>
    </nav>
  </header>

  <div class="content">
    <h1>Test Scroll</h1>
    <p>Scrolleá para ver si el menú queda fijo.</p>
  </div>

</body>
</html>
